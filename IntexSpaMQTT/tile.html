<style>
  .ispa { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: inherit;
          max-width: 440px; padding: 16px; border-radius: 16px;
          background: rgba(127,127,127,0.08); border: 1px solid rgba(127,127,127,0.18); box-sizing: border-box; }
  .ispa-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .ispa-title { font-size:16px; font-weight:600; }
  .ispa-conn { display:flex; align-items:center; gap:6px; font-size:12px; opacity:.7; }
  .ispa-dot { width:9px; height:9px; border-radius:50%; background:#9aa0a6; }
  .ispa-dot.on { background:#34c759; box-shadow:0 0 6px #34c759; }
  .ispa-power { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;
                cursor:pointer; font-size:19px; border:1px solid rgba(127,127,127,0.25);
                background:rgba(127,127,127,0.10); color:inherit; transition:all .15s; }
  .ispa-power.on { background:#34c759; color:#fff; border-color:transparent; box-shadow:0 0 9px rgba(52,199,89,.55); }
  .ispa-head-right { display:flex; align-items:center; gap:12px; }
  .ispa-off-note { font-size:12px; opacity:.6; text-align:center; margin-bottom:10px; }
  .ispa-dim { opacity:.4; pointer-events:none; }
  .ispa-tabs { display:flex; gap:6px; margin-bottom:14px; }
  .ispa-tab { flex:1; text-align:center; padding:8px; border-radius:10px; cursor:pointer; font-size:13px; font-weight:600;
              border:1px solid rgba(127,127,127,0.2); background:rgba(127,127,127,0.06); }
  .ispa-tab.active { background:#0a84ff; color:#fff; border-color:transparent; }
  .ispa-temp { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:12px; }
  .ispa-cur { font-size:38px; font-weight:700; line-height:1; }
  .ispa-cur small { font-size:16px; opacity:.6; }
  .ispa-lbl { font-size:11px; opacity:.55; text-transform:uppercase; letter-spacing:.5px; }
  .ispa-tgt .row { display:flex; align-items:center; gap:8px; }
  .ispa-tgt button { width:34px; height:34px; border-radius:9px; border:1px solid rgba(127,127,127,0.25);
                     background:rgba(127,127,127,0.10); color:inherit; font-size:20px; cursor:pointer; }
  .ispa-tgt .val { font-size:22px; font-weight:700; min-width:54px; text-align:center; }
  .ispa-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .ispa-btn { display:flex; flex-direction:column; align-items:center; gap:5px; padding:11px 6px; border-radius:11px;
              cursor:pointer; border:1px solid rgba(127,127,127,0.2); background:rgba(127,127,127,0.06);
              color:inherit; font-size:12.5px; font-weight:600; }
  .ispa-btn .ico { font-size:18px; }
  .ispa-btn.on { color:#fff; border-color:transparent; }
  .ispa-btn.on.heater{background:#ff7a18;} .ispa-btn.on.filter{background:#0a84ff;}
  .ispa-btn.on.bubbles{background:#00b8d4;} .ispa-btn.on.jets{background:#5e5ce6;}
  .ispa-btn.on.sanitizer{background:#30a46c;}
  .ispa.offline { opacity:.55; }
  .hidden { display:none !important; }
  /* Zeitplan */
  .sch-entry { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px;
               background:rgba(127,127,127,0.07); margin-bottom:7px; font-size:13px; }
  .sch-entry .t { font-weight:700; font-size:15px; }
  .sch-entry .d { opacity:.6; font-size:11px; }
  .sch-entry .a { flex:1; }
  .sch-entry .x { cursor:pointer; opacity:.6; font-size:16px; }
  .sch-entry .en { cursor:pointer; }
  .sch-add { margin-top:10px; padding:10px; border-radius:10px; border:1px dashed rgba(127,127,127,0.3); }
  .sch-add .r { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
  .sch-add input, .sch-add select { padding:6px; border-radius:8px; border:1px solid rgba(127,127,127,0.3);
                                     background:rgba(127,127,127,0.06); color:inherit; font-size:13px; }
  .day { width:30px; height:28px; border-radius:7px; border:1px solid rgba(127,127,127,0.25); cursor:pointer;
         font-size:11px; background:rgba(127,127,127,0.06); color:inherit; }
  .day.on { background:#0a84ff; color:#fff; border-color:transparent; }
  .sch-addbtn { width:100%; padding:9px; border-radius:9px; border:none; background:#0a84ff; color:#fff;
                font-weight:600; cursor:pointer; font-size:13px; }
</style>

<div class="ispa" id="ispa">
  <div class="ispa-head">
    <span class="ispa-title">Intex PureSpa</span>
    <div class="ispa-head-right">
      <span class="ispa-conn"><span class="ispa-dot" id="dot"></span><span id="conn">--</span></span>
      <div class="ispa-power" id="b-power" onclick="ispaToggle('Power')" title="Spa ein-/ausschalten">&#9211;</div>
    </div>
  </div>

  <div class="ispa-tabs">
    <div class="ispa-tab active" id="tab-control" onclick="ispaTab('control')">Steuerung</div>
    <div class="ispa-tab" id="tab-sched" onclick="ispaTab('sched')">Zeitplan</div>
  </div>

  <!-- STEUERUNG -->
  <div id="view-control">
    <div class="ispa-off-note hidden" id="off-note">Spa ist ausgeschaltet &ndash; zum Steuern oben einschalten.</div>
    <div id="control-inner">
    <div class="ispa-temp">
      <div><div class="ispa-cur"><span id="cur">--</span><small>&deg;C</small></div><div class="ispa-lbl">Ist</div></div>
      <div class="ispa-tgt">
        <div class="ispa-lbl" style="text-align:center;margin-bottom:5px;">Soll</div>
        <div class="row">
          <button onclick="ispaTemp(-1)">&minus;</button>
          <span class="val"><span id="tgt">--</span>&deg;</span>
          <button onclick="ispaTemp(1)">+</button>
        </div>
      </div>
    </div>
    <div class="ispa-grid">
      <div class="ispa-btn heater" id="b-heater" onclick="ispaToggle('Heater')"><span class="ico">&#128293;</span>Heizung</div>
      <div class="ispa-btn filter" id="b-filter" onclick="ispaToggle('Filter')"><span class="ico">&#128260;</span>Filter</div>
      <div class="ispa-btn bubbles" id="b-bubbles" onclick="ispaToggle('Bubbles')"><span class="ico">&#127754;</span>Sprudler</div>
      <div class="ispa-btn jets" id="b-jets" onclick="ispaToggle('Jets')"><span class="ico">&#128168;</span>Jets</div>
      <div class="ispa-btn sanitizer" id="b-sanitizer" onclick="ispaToggle('Sanitizer')" style="grid-column:1/-1;"><span class="ico">&#128167;</span>Hygienisierung</div>
    </div>
    </div>
  </div>

  <!-- ZEITPLAN -->
  <div id="view-sched" class="hidden">
    <div id="sch-list"></div>
    <div class="sch-add">
      <div class="r">
        <input type="time" id="sch-time" value="18:00">
        <select id="sch-action">
          <option value="heater">Heizung</option>
          <option value="filter">Filter</option>
          <option value="bubbles">Sprudler</option>
          <option value="jets">Jets</option>
          <option value="sanitizer">Hygienisierung</option>
          <option value="target">Soll-Temperatur</option>
        </select>
        <select id="sch-value">
          <option value="1">Ein</option>
          <option value="0">Aus</option>
        </select>
      </div>
      <div class="r" id="sch-days"></div>
      <button class="sch-addbtn" onclick="ispaAddEntry()">+ Eintrag hinzufügen</button>
    </div>
  </div>
</div>

<script>
  var ispaState = /*INITIAL_STATE*/null;
  var DAYS = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  var selDays = [0,1,2,3,4,5,6];

  function ispaTab(which) {
    document.getElementById('tab-control').className = 'ispa-tab' + (which==='control'?' active':'');
    document.getElementById('tab-sched').className = 'ispa-tab' + (which==='sched'?' active':'');
    document.getElementById('view-control').className = (which==='control'?'':'hidden');
    document.getElementById('view-sched').className = (which==='sched'?'':'hidden');
  }

  function ispaBtn(name, active) {
    var el = document.getElementById('b-' + name);
    if (el) el.className = 'ispa-btn ' + name + (active?' on':'') + (name==='sanitizer'?'':'');
    if (el && name==='sanitizer') el.style.gridColumn = '1/-1';
  }

  function ispaRender() {
    var s = ispaState; if (!s) return;
    document.getElementById('ispa').className = 'ispa' + (s.connected?'':' offline');
    document.getElementById('dot').className = 'ispa-dot' + (s.connected?' on':'');
    document.getElementById('conn').textContent = s.connected?'verbunden':'offline';
    var pw = document.getElementById('b-power');
    if (pw) pw.className = 'ispa-power' + (s.power?' on':'');
    var note = document.getElementById('off-note');
    var inner = document.getElementById('control-inner');
    if (note && inner) {
      if (s.power) { note.className = 'ispa-off-note hidden'; inner.className = ''; }
      else { note.className = 'ispa-off-note'; inner.className = 'ispa-dim'; }
    }
    document.getElementById('cur').textContent = (s.current>0)?s.current:'--';
    document.getElementById('tgt').textContent = s.target;
    // Filterpumpe laeuft auch, wenn geheizt oder hygienisiert wird (DP 106 = nur manuelle Taste)
    var filterRunning = s.filter || s.heater || s.sanitizer;
    ispaBtn('heater', s.heater); ispaBtn('filter', filterRunning); ispaBtn('bubbles', s.bubbles);
    ispaBtn('jets', s.jets); ispaBtn('sanitizer', s.sanitizer);
    ispaRenderSchedule();
  }

  function actionLabel(a) {
    return {heater:"Heizung",filter:"Filter",bubbles:"Sprudler",jets:"Jets",sanitizer:"Hygienisierung",target:"Soll-Temp"}[a]||a;
  }

  function ispaRenderSchedule() {
    var list = document.getElementById('sch-list');
    var sch = (ispaState && ispaState.schedule) ? ispaState.schedule : [];
    if (!sch.length) { list.innerHTML = '<div style="opacity:.5;font-size:13px;padding:6px;">Noch keine Einträge.</div>'; return; }
    var html = '';
    for (var i=0;i<sch.length;i++) {
      var e = sch[i];
      var dlabel = (e.days||[]).map(function(d){return DAYS[d];}).join(' ');
      var val = (e.action==='target') ? (e.value+'°C') : (e.value?'Ein':'Aus');
      html += '<div class="sch-entry">'
        + '<input type="checkbox" class="en" '+(e.enabled?'checked':'')+' onclick="ispaToggleEntry(\''+e.id+'\')">'
        + '<span class="t">'+e.time+'</span>'
        + '<span class="a">'+actionLabel(e.action)+': <b>'+val+'</b><br><span class="d">'+dlabel+'</span></span>'
        + '<span class="x" onclick="ispaDelEntry(\''+e.id+'\')">&#10006;</span>'
        + '</div>';
    }
    list.innerHTML = html;
  }

  function ispaRenderDays() {
    var c = document.getElementById('sch-days'); c.innerHTML = '';
    for (var i=0;i<7;i++) {
      var b = document.createElement('button');
      b.className = 'day' + (selDays.indexOf(i)>=0?' on':'');
      b.textContent = DAYS[i];
      (function(idx,btn){ btn.onclick = function(){
        var p = selDays.indexOf(idx);
        if (p>=0) selDays.splice(p,1); else selDays.push(idx);
        btn.className = 'day' + (selDays.indexOf(idx)>=0?' on':'');
      };})(i,b);
      c.appendChild(b);
    }
  }

  function ispaToggle(ident) {
    var key = ident.toLowerCase();
    requestAction(ident, !ispaState[key]);
  }
  function ispaTemp(d) {
    var t = ispaState.target + d; if (t<20) t=20; if (t>40) t=40;
    requestAction('TargetTemperature', t);
  }

  function ispaSaveSchedule(arr) {
    ispaState.schedule = arr;
    requestAction('Schedule', JSON.stringify(arr));
    ispaRenderSchedule();
  }
  function ispaAddEntry() {
    var time = document.getElementById('sch-time').value || '18:00';
    var action = document.getElementById('sch-action').value;
    var value = parseInt(document.getElementById('sch-value').value,10);
    var arr = (ispaState.schedule||[]).slice();
    arr.push({ id: 'e'+Date.now(), enabled:true, time:time, days:selDays.slice().sort(), action:action, value:value });
    ispaSaveSchedule(arr);
  }
  function ispaDelEntry(id) {
    var arr = (ispaState.schedule||[]).filter(function(e){return e.id!==id;});
    ispaSaveSchedule(arr);
  }
  function ispaToggleEntry(id) {
    var arr = (ispaState.schedule||[]).map(function(e){ if(e.id===id) e.enabled=!e.enabled; return e; });
    ispaSaveSchedule(arr);
  }

  function ispaActionValueToggle() {
    var a = document.getElementById('sch-action').value;
    var sel = document.getElementById('sch-value');
    if (a==='target') {
      sel.innerHTML='';
      for (var t=20;t<=40;t++){ var o=document.createElement('option'); o.value=t; o.text=t+'°C'; if(t===38)o.selected=true; sel.appendChild(o); }
    } else {
      sel.innerHTML='<option value="1">Ein</option><option value="0">Aus</option>';
    }
  }

  function handleMessage(data) {
    ispaState = (typeof data === 'string') ? JSON.parse(data) : data;
    ispaRender();
  }

  document.getElementById('sch-action').addEventListener('change', ispaActionValueToggle);
  ispaRenderDays();
  ispaRender();
</script>
